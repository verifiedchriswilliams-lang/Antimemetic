<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>&#8203;</title>
  <!--
    thereisnoantimemeticsdivision.com
    An unofficial fan work inspired by "There Is No Antimemetics Division"
    by qntm (Sam Hughes). Concepts originating on the SCP Foundation wiki
    (scp-wiki.wikidot.com) are licensed CC BY-SA 3.0; this page is a
    derivative work and is likewise shared under CC BY-SA 3.0.
    Type "credits" at the terminal. Read the book.
  
    If you are reading this source code: yes, the archive really does drift.
    No, this comment does not list how. That would defeat the purpose.
  -->
  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
      }
      body {
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            line-height: 1.45;
            color: #b8b8b8;
            cursor: default;
      }
      #crt {
            position: fixed; inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                    to bottom,
                    rgba(255,255,255,0.015) 0px,
                    rgba(255,255,255,0.015) 1px,
                    transparent 1px,
                    transparent 3px
                  );
            z-index: 10;
      }
      #screen {
            height: 100%;
            padding: 28px 32px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
      }
      #screen::-webkit-scrollbar { width: 0; }

      .boot { color: #33ff66; }
      .boot .warn { color: #ffb000; }
      .boot .err  { color: #ff4444; }

      .dim    { color: #555; }
      .white  { color: #e8e8e8; }
      .green  { color: #33ff66; }
      .amber  { color: #ffb000; }
      .red    { color: #ff4444; }
      .redact {
            background: #b8b8b8; color: #b8b8b8;
            user-select: none;
      }

      #cursor {
            display: inline-block;
            width: 9px; height: 18px;
            background: #b8b8b8;
            vertical-align: text-bottom;
            animation: blink 1.06s steps(1) infinite;
      }
      @keyframes blink { 50% { background: transparent; } }

      .glitch { animation: glitchShake 0.08s infinite; }
      @keyframes glitchShake {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(-1px,1px); }
            50%  { transform: translate(1px,-1px); }
            75%  { transform: translate(-1px,-1px); }
            100% { transform: translate(1px,1px); }
      }
    </style>
  </head>
  <body>
    <script>
      (() => {
          const rnd = () => Math.random();
          const nowMs = () => Date.now();
          const localNow = () => new Date();

          const crt = document.createElement('div');
          crt.id = 'crt';
          document.body.appendChild(crt);
          const screen = document.createElement('div');
          screen.id = 'screen';
          document.body.appendChild(screen);

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          function lsGet(k) { try { return localStorage.getItem(k); } catch (e) { return null; } }
          function lsSet(k, v) { try { localStorage.setItem(k, v); } catch (e) {} }

          const drift = {
                flickerConnect: rnd() < (1 / 15),
                mandelaVerified: rnd() < (1 / 40),
                typo: rnd() < (1 / 50),
                hesitate: rnd() < 0.005,
                favicon: rnd() < 0.2,
                memoryReadout: rnd() < (1 / 6),
                helloName: rnd() < 0.25,
          };
          const hesitateAtKey = 2 + Math.floor(rnd() * 7);

          if (drift.favicon) {
                const link = document.createElement('link');
                link.rel = 'icon';
                link.href = 'data:image/svg+xml,' + encodeURIComponent(
                        '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16">' +
                        '<rect x="7" y="7" width="2" height="2" fill="#33ff66"/></svg>');
                document.head.appendChild(link);
          }

          let cursorEl = null;

          function makeCursor() {
                const c = document.createElement('span');
                c.id = 'cursor';
                return c;
          }
          function scrollBottom() { screen.scrollTop = screen.scrollHeight; }

          function span(text, cls) {
                const s = document.createElement('span');
                if (cls) s.className = cls;
                s.textContent = text;
                return s;
          }

          function putLine(text, cls) {
                screen.appendChild(span(text + '\n', cls));
                scrollBottom();
          }

          let skipTyping = false;
          async function typeLine(text, cls, cps = 40) {
                const s = span('', cls);
                screen.appendChild(s);
                for (let i = 0; i < text.length; i++) {
                        s.textContent += text[i];
                        scrollBottom();
                        if (!skipTyping) await sleep(1000 / cps);
                }
                s.textContent += '\n';
                scrollBottom();
                return s;
          }

          function clearScreen() {
                screen.innerHTML = '';
                skipTyping = false;
          }

          function monthIndex() {
                const d = localNow();
                return d.getFullYear() * 12 + d.getMonth();
          }

          function isNov11() {
                const d = localNow();
                return d.getMonth() === 10 && d.getDate() === 11;
          }
          const whisperPool = [
                'you were about to type something. what was it?',
                'the cursor is not blinking for you.',
                'someone else was here a minute ago.',
                'it is quieter in here than it used to be. you noticed.',
                'you can stop waiting. it already happened.',
                'type the number. you still remember it. for now.',
              ];
          const idleWhisperMsg = whisperPool[monthIndex() % whisperPool.length];

          const o55MonthlyLine = [
                ['Acquisition records have not survived.', 'No action required.'],
                ['Chain of custody has not survived.', 'No action required.'],
                ['Continued possession cannot be confirmed.', 'No action required.'],
              ][monthIndex() % 3];

          const bootLines = [
                ['UO SECURE TERMINAL v4.7.1', '', 120],
                ['UNKNOWN ORGANISATION. WE KEEP WHAT CANNOT BE KEPT.', '', 40],
                ['', '', 0],
                ['BIOS DATE 04/11/91   CPU 486DX @ 33MHz', 'dim', 30],
                ['MEMORY TEST : 65536 KB OK', 'dim', 200],
                ['', '', 0],
                ['LOADING KERNEL ................ OK', '', 250],
                ['MOUNTING /dev/veil ............ OK', '', 250],
                ['COGNITOHAZARD FILTER .......... ACTIVE', '', 250],
                ['MEMETIC INOCULATION ........... CURRENT', '', 250],
                ['MNESTIC CLEARANCE ............. VERIFYING', '', 700],
                ['MNESTIC CLEARANCE ............. UNVERIFIED', 'warn', 300],
                ['', '', 0],
                ['WARNING: YOU ARE ACCESSING THIS SYSTEM WITHOUT MNESTIC', 'warn', 20],
                ['SUPPORT. UNAUTHORIZED PERSONNEL WILL NOT REMEMBER', 'warn', 20],
                ['THIS VISIT.', 'warn', 400],
                ['', '', 0],
                ['CONNECTING TO ANTIMEMETICS DIVISION FILESERVER...', '', 900],
                ['', '', 0],
                ['ERROR: NO SUCH DIVISION.', 'err', 600],
              ];

          function buildBootLines() {
                let lines = bootLines.map(l => l.slice());

                if (drift.mandelaVerified || lsGet('uo_verified')) {
                        lines = lines.map(l =>
                                  l[0] === 'MNESTIC CLEARANCE ............. UNVERIFIED'
                                                    ? ['MNESTIC CLEARANCE ............. VERIFIED', '', 300]
                                    : l);
                }

                if (drift.typo) {
                        const typos = [
                                  ['COGNITOHAZARD FILTER .......... ACTIVE',
                                            'COGNITOHAZARD FILTER .......... ACTVE'],
                                  ['MEMORY TEST : 65536 KB OK',
                                            'MEMORY TSET : 65536 KB OK'],
                                ];
                        const t = typos[Math.floor(rnd() * typos.length)];
                        lines = lines.map(l => l[0] === t[0] ? [t[1], l[1], l[2]] : l);
                }

                if (isNov11()) {
                        lines = lines.map(l =>
                                  l[0] === 'ERROR: NO SUCH DIVISION.'
                                                    ? ['CONNECTED.', '', 600] : l);
                }
                return lines;
          }

          let bootSkipped = false;
          function skipBoot() { bootSkipped = true; skipTyping = true; }

          async function boot() {
                document.addEventListener('keydown', skipBoot, { once: true });
                document.addEventListener('click', skipBoot, { once: true });

                const wrap = document.createElement('span');
                wrap.className = 'boot';
                screen.appendChild(wrap);

                const r94 = lsGet('uo_read9429_at');
                if (r94 && !lsGet('uo_welcomed') &&
                            nowMs() - Number(r94) >= 7 * 86400000) {
                        lsSet('uo_welcomed', '1');
                        wrap.appendChild(span('Welcome back.\n', 'warn'));
                        scrollBottom();
                        if (!bootSkipped) await sleep(1200);
                        wrap.appendChild(span('Someone remembered.\n\n', 'warn'));
                        scrollBottom();
                        if (!bootSkipped) await sleep(1800);
                }

                const lines = buildBootLines();
                for (const [text, cls, pause] of lines) {
                        if (text.indexOf('ERROR:') === 0 && drift.flickerConnect && !bootSkipped) {
                                  const c = span('CONNECTED.\n', '');
                                  wrap.appendChild(c);
                                  scrollBottom();
                                  await sleep(500);
                                  c.remove();
                        }
                        const s = span(text + '\n', cls);
                        wrap.appendChild(s);
                        scrollBottom();
                        if (!bootSkipped) await sleep(pause + text.length * 8);
                }
                await sleep(bootSkipped ? 200 : 1400);
                document.removeEventListener('keydown', skipBoot);
                document.removeEventListener('click', skipBoot);
                clearScreen();
                await sleep(600);

                const lf = lsGet('uo_lastfile');
                const lfa = lsGet('uo_lastfile_at');
                if (lf && lfa && drift.memoryReadout) {
                        const days = Math.max(1, Math.floor((nowMs() - Number(lfa)) / 86400000));
                        await typeLine('last verified memory: ' + lf, 'dim', 30);
                        await typeLine('retention: ' + days + (days === 1 ? ' day' : ' days'), 'dim', 30);
                        putLine('');
                        await sleep(900);
                }

                if (rnd() < 0.01) {
                        const originalTitle = document.title;
                        document.title = 'Marie Quinn';
                        setTimeout(() => { document.title = originalTitle; }, 500);
                }

                startTerminal();
          }

          let inputSpan = null;
          let buffer = '';
          let accepting = false;
          let busy = false;
          let failedAttempts = 0;
          let idleTimer = null;
          let idleFired = false;
          let keyCount = 0;
          let inputMode = null;
          let queriesThisSession = 0;

          function newPromptLine() {
                inputSpan = span('', 'white');
                screen.appendChild(inputSpan);
                cursorEl = makeCursor();
                screen.appendChild(cursorEl);
                scrollBottom();
                buffer = '';
                accepting = true;
                resetIdle();
          }

          function removePrompt() {
                accepting = false;
                if (cursorEl) { cursorEl.remove(); cursorEl = null; }
          }

          function resetIdle() {
                clearTimeout(idleTimer);
                if (idleFired) return;
                idleTimer = setTimeout(idleWhisper, 60000);
          }

          async function idleWhisper() {
                if (!accepting || busy || buffer.length) { resetIdle(); return; }
                idleFired = true;
                busy = true;
                removePrompt();
                const s = span('', 'dim');
                screen.appendChild(s);
                for (const ch of idleWhisperMsg) {
                        s.textContent += ch; scrollBottom(); await sleep(55);
                }
                await sleep(2600);
                while (s.textContent.length) {
                        s.textContent = s.textContent.slice(0, -1);
                        await sleep(18);
                }
                s.remove();
                busy = false;
                newPromptLine();
          }

          function startTerminal() {
                newPromptLine();
                document.addEventListener('keydown', onKey);
          }

          function acceptChar(ch) {
                if (buffer.length < 60) {
                        buffer += ch;
                        inputSpan.textContent = buffer;
                }
                scrollBottom();
          }

          function onKey(e) {
                if (!accepting || busy) return;
                resetIdle();

                if (inputMode === 'yn4512') {
                        if (e.key.length === 1) {
                                  const k = e.key.toLowerCase();
                                  if (k === 'y' || k === 'n') {
                                              e.preventDefault();
                                              inputMode = null;
                                              removePrompt();
                                              busy = true;
                                              putLine(k.toUpperCase(), 'white');
                                              fragmentContinue(k === 'y').then(() => {
                                                            busy = false;
                                                            putLine('');
                                                            newPromptLine();
                                              });
                                  }
                        }
                        return;
                }

                if (e.key === 'Enter') {
                        e.preventDefault();
                        submit();
                } else if (e.key === 'Backspace') {
                        e.preventDefault();
                        buffer = buffer.slice(0, -1);
                        inputSpan.textContent = buffer;
                } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        keyCount++;
                        if (drift.hesitate && keyCount === hesitateAtKey) {
                                  const ch = e.key;
                                  setTimeout(() => { if (accepting && !busy) acceptChar(ch); }, 200);
                        } else {
                                  acceptChar(e.key);
                        }
                }
          }

          async function submit() {
                const raw = buffer.trim();
                removePrompt();
                busy = true;

                if (inputMode === 'b30idea') {
                        inputMode = null;
                        await b30ReceiveIdea(raw);
                        busy = false;
                        if (!accepting) { newPromptLine(); }
                        return;
                }
                if (inputMode === 'b30name') {
                        inputMode = null;
                        await b30ReceiveName(raw);
                        busy = false;
                        if (!accepting) { putLine(''); newPromptLine(); }
                        return;
                }

                const cmd = normalize(raw);
                if (raw) queriesThisSession++;

                if (!raw) {
                } else if (handlers[cmd]) {
                        putLine('');
                        await handlers[cmd]();
                } else {
                        await unknown(raw);
                }
                busy = false;
                if (!accepting) { putLine(''); newPromptLine(); }
          }

          function normalize(s) {
                let c = s.toLowerCase().trim().replace(/\s+/g, ' ');
                c = c.replace(/^(scp|u)[-\s]*(?=\d)/, '');
                if (/^\d+$/.test(c)) c = String(parseInt(c, 10));
                return c;
          }

          async function unknown(raw) {
                failedAttempts++;
                await sleep(400);
                while (inputSpan.textContent.length) {
                        inputSpan.textContent = inputSpan.textContent.slice(0, -1);
                        await sleep(30);
                }
                inputSpan.remove();
                if (failedAttempts === 3) {
                        await sleep(800);
                        await typeLine('stop guessing.', 'dim', 18);
                        await typeLine('you already know the number.', 'dim', 18);
                        putLine('');
                }
          }

          async function noSuchRecord() {
                await sleep(700);
                await typeLine('NO SUCH RECORD.', 'dim', 30);
          }

          async function header(item) {
                await typeLine('ACCESSING ' + item + ' ...', 'dim', 60);
                await sleep(500);
                putLine('');
          }

          function markFile(name) {
                lsSet('uo_lastfile', name);
                lsSet('uo_lastfile_at', String(nowMs()));
          }

          async function fragmentContinue(yes) {
                putLine('');
                if (!yes) {
                        await sleep(900);
                        await typeLine('Acknowledged.', 'dim', 25);
                        await sleep(700);
                        await typeLine('No further recovery attempted.', 'dim', 25);
                        return;
                }
                await sleep(800);
                await typeLine('█████ ██ ███ DESCRIPTION: ██████████ the ceiling of', 'white', 55);
                await typeLine('██████████ █████████ all seventeen ███████', 'white', 55);
                await typeLine('simultaneously ██████ ███ ████████████', 'white', 55);
                putLine('');
                await typeLine('  "they were singing" ████████████ █████', 'white', 55);
                putLine('');
                await typeLine('  INTERVIEWER: continue.', 'white', 55);
                await typeLine('  SUBJECT: [NO RESPONSE]', 'white', 55);
                putLine('');
                await typeLine('█████████████ recovery terminated ██████', 'white', 55);
                putLine('');
                await sleep(1200);
                await typeLine('REMAINING CONTENT', 'amber', 40);
                putLine('');
                await typeLine('Unavailable.', 'amber', 40);
                await sleep(700);
                await typeLine('Reason unavailable:', 'amber', 40);
                await sleep(700);
                await typeLine('Unavailable.', 'amber', 40);
          }

          async function b30ReceiveIdea(raw) {
                const idea = (raw || '').slice(0, 200);
                lsSet('uo_b30_idea', idea || '(nothing)');
                putLine('');
                await sleep(700);
                if (!idea) {
                        await typeLine('that is also an idea.', 'dim', 25);
                }
                await typeLine('received.', 'dim', 25);
                await sleep(900);
                await typeLine('and who should it remember?', 'dim', 25);
                putLine('');
                inputMode = 'b30name';
                newPromptLine();
          }

          async function b30ReceiveName(raw) {
                let name = (raw || '').trim().split(/\s+/)[0].replace(/[^a-zA-Z'-]/g, '');
                if (name.length >= 2 && name.length <= 20) {
                        name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
                        lsSet('uo_b30_name', name);
                }
                putLine('');
                await sleep(700);
                await typeLine('thank you.', 'dim', 25);
                await sleep(700);
                await typeLine('he says he is close.', 'dim', 25);
                await sleep(900);
                await typeLine('forget you were here.', 'dim', 25);
          }

          const handlers = {

                '55': async () => {
                        markFile('U-0055');
                        await header('FILE U-0055');
                        await typeLine('ITEM #: U-0055', 'green', 80);
                        await typeLine('CLASS: [UNKNOWN]', 'green', 80);
                        await typeLine('LOCATION: UO PRIMARY ARCHIVE FACILITY, BLACK RIVER', 'green', 80);
                        putLine('');
                        await typeLine('CONTAINMENT: 5.00 x 5.00 x 2.50m unit. Do not post', 'white', 55);
                        await typeLine('security personnel outside the unit. There is no', 'white', 55);
                        await typeLine('operational requirement to post security personnel', 'white', 55);
                        await typeLine('outside the unit.', 'white', 55);
                        putLine('');
                        await typeLine('DESCRIPTION: U-0055 is a self-keeping secret.', 'white', 55);
                        putLine('');
                        await typeLine('It may be observed.', 'white', 55);
                        await typeLine('It may be documented.', 'white', 55);
                        await typeLine('Extensive documentation exists.', 'white', 55);
                        putLine('');
                        await typeLine('No member of personnel has demonstrated the ability', 'white', 55);
                        await typeLine('to retain either the documentation or the reason it', 'white', 55);
                        await typeLine('was produced.', 'white', 55);
                        putLine('');
                        await typeLine('The following characteristics remain verified:', 'white', 55);
                        putLine('');
                        await typeLine('    - U-0055 is not spherical.', 'white', 55);
                        await typeLine('    - U-0055 is not round.', 'white', 55);
                        if (lsGet('uo_read3125')) {
                                  await typeLine('    - U-0055 is not the only one.', 'white', 55);
                        }
                        putLine('');
                        await typeLine(o55MonthlyLine[0], 'white', 55);
                        await typeLine(o55MonthlyLine[1], 'white', 55);
                        putLine('');
                        await sleep(900);
                        await typeLine('ADDENDUM:', 'amber', 40);
                        putLine('');
                        await typeLine('U-0055 is not a sphere.', 'white', 40);
                        putLine('');
                        await sleep(900);
                        await typeLine('further descriptive revisions require prior approval.', 'dim', 30);
                        await sleep(700);
                        await typeLine('repeated revisions have not improved the record.', 'dim', 30);
                },

                '2200': async () => {
                        markFile('U-2200');
                        await header('FILE U-2200');
                        await typeLine('ITEM #: U-2200', 'green', 80);
                        await typeLine('CLASS: PASSIVE / COOPERATIVE', 'green', 80);
                        await typeLine('LOCATION: PASSIVE CONTAINMENT ARCHIVE, UO WYELEIGH', 'green', 80);
                        putLine('');
                        await typeLine('SPECIAL CONTAINMENT PROCEDURES:', 'white', 55);
                        putLine('');
                        await typeLine('Personnel assigned to U-2200 for more than three', 'white', 55);
                        await typeLine('consecutive interviews should rotate assignments', 'white', 55);
                        await typeLine('for a minimum of thirty days.', 'white', 55);
                        putLine('');
                        await typeLine('Hospitality offered by U-2200 does not constitute', 'white', 55);
                        await typeLine('an authorised staff benefit.', 'white', 55);
                        putLine('');
                        await typeLine('Personnel are reminded that accepting recreational', 'white', 55);
                        await typeLine('drug referrals from Unknowns requires Level 3', 'white', 55);
                        await typeLine('approval.', 'white', 55);
                        putLine('');
                        await typeLine('Discussions concerning annual leave should not be', 'white', 55);
                        await typeLine('prolonged.', 'white', 55);
                        putLine('');
                        await typeLine('DESCRIPTION:', 'white', 55);
                        putLine('');
                        await typeLine('U-2200 is a non-corporeal telepathic entity resident', 'white', 55);
                        await typeLine('within a prehistoric stone monolith.', 'white', 55);
                        putLine('');
                        await typeLine('It identifies itself as the Johorean god of', 'white', 55);
                        await typeLine('forgetting how to ride a bicycle.', 'white', 55);
                        putLine('');
                        await typeLine('The designation has not been disputed.', 'white', 55);
                        putLine('');
                        await typeLine('U-2200 remains consistently cooperative.', 'white', 55);
                        putLine('');
                        await typeLine('Operational value remains inconsistent.', 'white', 55);
                        putLine('');
                        await sleep(1200);
                        await typeLine('EXIT PROCEDURE:', 'amber', 50);
                        putLine('');
                        await typeLine('Personnel should confirm continued ability to ride', 'dim', 30);
                        await typeLine('a bicycle before departing the archive.', 'dim', 30);
                },

                '2256': async () => {
                        const day = localNow().getDay();
                        if (day === 0 || day === 3) { await noSuchRecord(); return; }
                        markFile('U-2256');
                        await header('FILE U-2256');
                        const lines = [];
                        lines.push(await typeLine('ITEM #: U-2256', 'green', 80));
                        lines.push(await typeLine('CLASS: NEUTRALISED', 'green', 80));
                        putLine('');
                        lines.push(await typeLine('DESCRIPTION:', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('U-2256 (Cryptomorpha gigantes) was a species of', 'white', 55));
                        lines.push(await typeLine('gigafauna endemic to the South Pacific.', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('Adult specimens exceeded one thousand metres in', 'white', 55));
                        lines.push(await typeLine('height whilst rarely exceeding four tonnes in', 'white', 55));
                        lines.push(await typeLine('recorded mass.', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('The species possessed a naturally occurring', 'white', 55));
                        lines.push(await typeLine('antimemetic defence rendering observation,', 'white', 55));
                        lines.push(await typeLine('documentation and recollection unreliable.', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('The people of Takalu\'i retained the ability to', 'white', 55));
                        lines.push(await typeLine('observe U-2256 through the use of a locally', 'white', 55));
                        lines.push(await typeLine('prepared suppressant known as kaketou.', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('Local designation:', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('    lopo\'ongakau', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('Translation:', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('    "The ones who walk very slowly."', 'white', 55));
                        putLine('');
                        lines.push(await typeLine('Observation by this Organisation is no longer', 'white', 55));
                        lines.push(await typeLine('authorised.', 'white', 55));
                        putLine('');
                        await sleep(1200);
                        await typeLine('NOTICE: INFORMATION DECAY IN PROGRESS.', 'red', 40);
                        await sleep(900);
                        for (const lineEl of lines) {
                                  await redactWords(lineEl);
                        }
                        await sleep(1000);
                        await typeLine('ADDENDUM [POST-EVENT]:', 'amber', 35);
                        putLine('');
                        await typeLine('There is something on the horizon.', 'amber', 35);
                        putLine('');
                        await sleep(800);
                        await typeLine('classification under review.', 'dim', 25);
                },

                '3125': async () => {
                        if (lsGet('uo_read3125')) {
                                  await sleep(900);
                                  await typeLine('You already know this one.', 'white', 40);
                                  await sleep(700);
                                  await typeLine('Try remembering something else.', 'dim', 30);

                        await typeLine('  the rest are not vaults.', 'dim', 30);
                },

                'history': async () => {
                        await sleep(1000);
                        await typeLine('No previous session exists.', 'white', 30);
                },

                'mnestic': async () => {
                        await typeLine('CLASS-W MNESTIC: sustained-release, low dosage.', 'white', 45);
                        await typeLine('You will remember everything, forever.', 'white', 45);
                        await typeLine('This is less pleasant than it sounds.', 'dim', 35);
                },
                'mnestics': async () => handlers['mnestic'](),

                'remember': async () => {
                        await sleep(900);
                        if (lsGet('uo_read3125')) {
                                  await typeLine('remember who?', 'dim', 22);
                        } else {
                                  await typeLine('remember what?', 'dim', 22);
                        }
                },

                'forget': async () => {
                        await sleep(900);
                        clearScreen();
                        await sleep(600);
                        await typeLine('done.', 'dim', 22);
                        putLine('');
                        newPromptLine();
                },

                'unknowns': async () => {
                        await typeLine('if there were an index, this would be it.', 'dim', 25);
                },
                'list': async () => handlers['unknowns'](),
                'index': async () => handlers['unknowns'](),

                'help': async () => {
                        await typeLine('there is no help.', 'dim', 25);
                },

                'hello': async () => {
                        const name = lsGet('uo_b30_name');
                        if (name && drift.helloName) {
                                  await sleep(1100);
                                  await typeLine(name + '.', 'dim', 18);
                                  await sleep(1400);
                        }
                        await typeLine('nobody is here.', 'dim', 25);
                },

                'clear': async () => {
                        clearScreen();
                        newPromptLine();
                },

                'qntm': async () => {
                        await header('ANOMALY ASSESSMENT');
                        await typeLine('CLASSIFICATION: NARRATIVE CONTAMINATION', 'green', 60);
                        await typeLine('CONTAINMENT STATUS: IMPOSSIBLE', 'red', 60);
                        putLine('');
                        await sleep(1000);
                        await typeLine('RECOMMENDATION: read the reports.', 'white', 40);
                        putLine('');
                        await sleep(1200);
                        await typeLine('do not trust the storyteller.', 'dim', 25);
                },

                'sam hughes': async () => {
                        await sleep(900);
                        await typeLine('no personnel by that name.', 'dim', 25);
                        await sleep(1400);
                        await typeLine('...documentation suggests otherwise.', 'dim', 22);
                },
                'samhughes': async () => handlers['sam hughes'](),

                'credits': async () => {
                        await typeLine('unofficial archival reconstruction.', 'dim', 40);
                        await typeLine('inspired by THERE IS NO ANTIMEMETICS DIVISION', 'dim', 40);
                        await typeLine('by qntm (Sam Hughes).', 'dim', 40);
                        await typeLine('concepts originating on the SCP Foundation wiki are', 'dim', 40);
                        await typeLine('CC BY-SA 3.0, as is this page.', 'dim', 40);
                        putLine('');
                        await sleep(900);
                        await typeLine('if these records have encouraged you to spend more', 'dim', 35);
                        await typeLine('time in this universe...', 'dim', 35);
                        await sleep(1200);
                        await typeLine('read the book.', 'dim', 30);
                },
          };

          if (isNov11()) {
                handlers['division'] = async () => {
                        await sleep(900);
                        await typeLine('it is here today.', 'green', 30);
                        await sleep(900);
                        await typeLine('it will not be, tomorrow.', 'dim', 25);
                };
          }

          async function redactWords(lineEl) {
                const text = lineEl.textContent.replace(/\n$/, '');
                const words = text.split(' ');
                lineEl.textContent = '';
                const parts = words.map((w, i) => {
                        const p = span(w + (i < words.length - 1 ? ' ' : ''), lineEl.className);
                        lineEl.appendChild(p);
                        return p;
                });
                lineEl.appendChild(span('\n'));
                const order = parts.map((_, i) => i).sort(() => rnd() - 0.5);
                for (const i of order) {
                        const p = parts[i];
                        const len = p.textContent.trimEnd().length;
                        p.textContent = '█'.repeat(len) + (p.textContent.endsWith(' ') ? ' ' : '');
                        p.className = 'redact';
                        await sleep(70);
                }
          }

          boot();
      })();
    </script>

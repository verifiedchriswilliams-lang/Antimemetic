  <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
      }
      body {
            font-family: "Courier New", Courier, monospace;
            font-size: 16px;
            line-height: 1.45;
            color: #b8b8b8;
            cursor: default;
      }
      #crt {
            position: fixed; inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                    to bottom,
                    rgba(255,255,255,0.015) 0px,
                    rgba(255,255,255,0.015) 1px,
                    transparent 1px,
                    transparent 3px
                  );
            z-index: 10;
      }
      #screen {
            height: 100%;
            padding: 28px 32px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
      }
      #screen::-webkit-scrollbar { width: 0; }

      .boot { color: #33ff66; }
      .boot .warn { color: #ffb000; }
      .boot .err  { color: #ff4444; }

      .dim    { color: #555; }
      .white  { color: #e8e8e8; }
      .green  { color: #33ff66; }
      .amber  { color: #ffb000; }
      .red    { color: #ff4444; }
      .redact {
            background: #b8b8b8; color: #b8b8b8;
            user-select: none;
      }

      #cursor {
            display: inline-block;
            width: 9px; height: 18px;
            background: #b8b8b8;
            vertical-align: text-bottom;
            animation: blink 1.06s steps(1) infinite;
      }
      @keyframes blink { 50% { background: transparent; } }

      .glitch { animation: glitchShake 0.08s infinite; }
      @keyframes glitchShake {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(-1px,1px); }
            50%  { transform: translate(1px,-1px); }
            75%  { transform: translate(-1px,-1px); }
            100% { transform: translate(1px,1px); }
      }
    </style>
  </head>
  <body>
    <div id="crt"></div>
    <div id="screen"></div>

    <script>
      (() => {
          const screen = document.getElementById('screen');
          const sleep = ms => new Promise(r => setTimeout(r, ms));

          let cursorEl = null;

          function makeCursor() {
                const c = document.createElement('span');
                c.id = 'cursor';
                return c;
          }
          function scrollBottom() { screen.scrollTop = screen.scrollHeight; }

          function span(text, cls) {
                const s = document.createElement('span');
                if (cls) s.className = cls;
                s.textContent = text;
                return s;
          }

          function putLine(text, cls) {
                screen.appendChild(span(text + '\n', cls));
                scrollBottom();
          }

          let skipTyping = false;
          async function typeLine(text, cls, cps = 40) {
                const s = span('', cls);
                screen.appendChild(s);
                for (let i = 0; i < text.length; i++) {
                        s.textContent += text[i];
                        scrollBottom();
                        if (!skipTyping) await sleep(1000 / cps);
                }
                s.textContent += '\n';
                scrollBottom();
                return s;
          }

          function clearScreen() {
                screen.innerHTML = '';
                skipTyping = false;
          }

          const bootLines = [
                ['UO SECURE TERMINAL v4.7.1', '', 120],
                ['UNKNOWN ORGANISATION. WE KEEP WHAT CANNOT BE KEPT.', '', 40],
                ['', '', 0],
                ['BIOS DATE 04/11/91   CPU 486DX @ 33MHz', 'dim', 30],
                ['MEMORY TEST : 65536 KB OK', 'dim', 200],
                ['', '', 0],
                ['LOADING KERNEL ................ OK', '', 250],
                ['MOUNTING /dev/veil ............ OK', '', 250],
                ['COGNITOHAZARD FILTER .......... ACTIVE', '', 250],
                ['MEMETIC INOCULATION ........... CURRENT', '', 250],
                ['MNESTIC CLEARANCE ............. VERIFYING', '', 700],
                ['MNESTIC CLEARANCE ............. UNVERIFIED', 'warn', 300],
                ['', '', 0],
                ['WARNING: YOU ARE ACCESSING THIS SYSTEM WITHOUT MNESTIC', 'warn', 20],
                ['SUPPORT. UNAUTHORIZED PERSONNEL WILL NOT REMEMBER', 'warn', 20],
                ['THIS VISIT.', 'warn', 400],
                ['', '', 0],
                ['CONNECTING TO ANTIMEMETICS DIVISION FILESERVER...', '', 900],
                ['', '', 0],
                ['ERROR: NO SUCH DIVISION.', 'err', 600],
              ];

          let bootSkipped = false;
          function skipBoot() { bootSkipped = true; skipTyping = true; }

          async function boot() {
                document.addEventListener('keydown', skipBoot, { once: true });
                document.addEventListener('click', skipBoot, { once: true });
                const wrap = document.createElement('span');
                wrap.className = 'boot';
                screen.appendChild(wrap);
                for (const [text, cls, pause] of bootLines) {
                        const s = span(text + '\n', cls);
                        wrap.appendChild(s);
                        scrollBottom();
                        if (!bootSkipped) await sleep(pause + text.length * 8);
                }
                await sleep(bootSkipped ? 200 : 1400);
                document.removeEventListener('keydown', skipBoot);
                document.removeEventListener('click', skipBoot);
                clearScreen();
                await sleep(600);
                startTerminal();
          }

          let inputSpan = null;
          let buffer = '';
          let accepting = false;
          let busy = false;
          let failedAttempts = 0;
          let idleTimer = null;
          let idleFired = false;

          function newPromptLine() {
                inputSpan = span('', 'white');
                screen.appendChild(inputSpan);
                cursorEl = makeCursor();
                screen.appendChild(cursorEl);
                scrollBottom();
                buffer = '';
                accepting = true;
                resetIdle();
          }

          function removePrompt() {
                accepting = false;
                if (cursorEl) { cursorEl.remove(); cursorEl = null; }
          }

          function resetIdle() {
                clearTimeout(idleTimer);
                if (idleFired) return;
                idleTimer = setTimeout(idleWhisper, 60000);
          }

          async function idleWhisper() {
                if (!accepting || busy || buffer.length) { resetIdle(); return; }
                idleFired = true;
                busy = true;
                removePrompt();
                const s = span('', 'dim');
                screen.appendChild(s);
                const msg = 'you were about to type something. what was it?';
                for (const ch of msg) { s.textContent += ch; scrollBottom(); await sleep(55); }
                await sleep(2600);
                while (s.textContent.length) {
                        s.textContent = s.textContent.slice(0, -1);
                        await sleep(18);
                }
                s.remove();
                busy = false;
                newPromptLine();
          }

          function startTerminal() {
                newPromptLine();
                document.addEventListener('keydown', onKey);
          }

          function onKey(e) {
                if (!accepting || busy) return;
                resetIdle();
                if (e.key === 'Enter') {
                        e.preventDefault();
                        submit();
                } else if (e.key === 'Backspace') {
                        e.preventDefault();
                        buffer = buffer.slice(0, -1);
                        inputSpan.textContent = buffer;
                } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        if (buffer.length < 60) {
                                  buffer += e.key;
                                  inputSpan.textContent = buffer;
                        }
                        scrollBottom();
                }
          }

          async function submit() {
                const raw = buffer.trim();
                removePrompt();
                busy = true;
                const cmd = normalize(raw);

                if (!raw) {
                } else if (handlers[cmd]) {
                        putLine('');
                        await handlers[cmd]();
                } else {
                        await unknown(raw);
                }
                busy = false;
                if (!accepting) { putLine(''); newPromptLine(); }
          }

          function normalize(s) {
                let c = s.toLowerCase().trim();
                c = c.replace(/^(scp|u)[-\s]*/, '');
                if (/^\d+$/.test(c)) c = String(parseInt(c, 10));
                return c;
          }

          async function unknown(raw) {
                failedAttempts++;
                await sleep(400);
                while (inputSpan.textContent.length) {
                        inputSpan.textContent = inputSpan.textContent.slice(0, -1);
                        await sleep(30);
                }
                inputSpan.remove();
                if (failedAttempts === 3) {
                        await sleep(800);
                        await typeLine('stop guessing.', 'dim', 18);
                        await typeLine('you already know the number.', 'dim', 18);
                        putLine('');
                }
          }

          async function header(item) {
                await typeLine('ACCESSING ' + item + ' ...', 'dim', 60);
                await sleep(500);
                putLine('');
          }

                        await typeLine('It can be observed. It can be recorded. Extensive', 'white', 55);

                        putLine('');
                        await typeLine('DESCRIPTION: U-2200 is a non-corporeal telepathic', 'white', 55);
                        await typeLine('entity residing in a stone monolith. It identifies', 'white', 55);
                        await typeLine('itself as the prehistoric Johorean god of forgetting', 'white', 55);
                        await typeLine('how to ride a bicycle.', 'white', 55);
                        putLine('');
                        await typeLine('U-2200 subsists on voluntarily surrendered memories', 'white', 55);
                        await typeLine('of bicycle riding. It is talkative, unhelpful, and', 'white', 55);
                        await typeLine('persistently advises visitors to take a holiday.', 'white', 55);
                        putLine('');
                        await typeLine('INTERVIEW EXCERPT:', 'amber', 50);
                        await typeLine('  "you seem tired."', 'white', 40);
                        await typeLine('  "have you considered barbados?"', 'white', 40);
                        putLine('');
                        await sleep(1600);
                        await typeLine('NOTE: now that you have finished this file, please', 'dim', 30);

                'list': async () => handlers['unknowns'](),
                'index': async () => handlers['unknowns'](),

                'help': async () => {

                        await typeLine('THERE IS NO ANTIMEMETICS DIVISION by qntm (Sam Hughes).', 'dim', 40);
                        await typeLine('concepts originating on the SCP Foundation wiki are', 'dim', 40);
                        await typeLine('CC BY-SA 3.0, as is this page.', 'dim', 40);
                        await typeLine('read the book. while you still remember it exists.', 'dim', 40);
                },
          };

          async function redactWords(lineEl) {
                const text = lineEl.textContent.replace(/\n$/, '');
                const words = text.split(' ');
                lineEl.textContent = '';
                const parts = words.map((w, i) => {
                        const p = span(w + (i < words.length - 1 ? ' ' : ''), lineEl.className);
                        lineEl.appendChild(p);
                        return p;
                });
                lineEl.appendChild(span('\n'));
                const order = parts.map((_, i) => i).sort(() => Math.random() - 0.5);
                for (const i of order) {
                        const p = parts[i];
                        const len = p.textContent.trimEnd().length;
                        p.textContent = '█'.repeat(len) + (p.textContent.endsWith(' ') ? ' ' : '');
                        p.className = 'redact';
                        await sleep(70);
                }
          }

          boot();
      })();
    </script>
